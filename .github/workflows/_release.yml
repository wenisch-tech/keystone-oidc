name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      changelog:
        required: true
        type: string
    secrets:
      SVN_USERNAME:
        required: true
      SVN_PASSWORD:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync subversion zip

      - name: Update plugin version in PHP header
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s/^ \* Version:.*/ * Version: ${VERSION}/" keystone-oidc.php
          sed -i "s/define( 'KEYSTONE_OIDC_VERSION', '[^']*' )/define( 'KEYSTONE_OIDC_VERSION', '${VERSION}' )/" keystone-oidc.php

      - name: Update stable tag in readme.txt
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s/^Stable tag:.*/Stable tag: ${VERSION}/" readme.txt

      - name: Generate WordPress.org changelog
        env:
          RELEASE_CHANGELOG: ${{ inputs.changelog }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"

          printf '%s\n' "${RELEASE_CHANGELOG}" > /tmp/release-changelog.md

          if ! grep -q '[^[:space:]]' /tmp/release-changelog.md; then
            echo '* Maintenance release.' > /tmp/release-changelog.md
          fi

          awk -v version="${VERSION}" '
            BEGIN {
              in_changelog = 0
              skipping_version = 0
            }
            /^== Changelog ==$/ {
              in_changelog = 1
              print
              next
            }
            /^== [^=].* ==$/ {
              if (in_changelog) {
                in_changelog = 0
              }
              skipping_version = 0
              print
              next
            }
            in_changelog && $0 == "= " version " =" {
              skipping_version = 1
              next
            }
            skipping_version && /^= .* =$/ {
              skipping_version = 0
            }
            skipping_version {
              next
            }
            { print }
          ' readme.txt > readme.txt.clean
          mv readme.txt.clean readme.txt

          awk -v version="${VERSION}" -v changelog_file="/tmp/release-changelog.md" '
            /^== Changelog ==$/ {
              print
              print ""
              print "= " version " ="
              while ((getline line < changelog_file) > 0) {
                print line
              }
              close(changelog_file)
              next
            }
            { print }
          ' readme.txt > readme.txt.tmp
          mv readme.txt.tmp readme.txt

          awk '
            /^== Changelog ==$/ {
              in_changelog = 1
              print
              next
            }
            /^== [^=].* ==$/ {
              if (in_changelog) {
                exit
              }
            }
            in_changelog {
              print
            }
          ' readme.txt > changelog.txt

      - name: Commit release version and changelog
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          TAG="${{ inputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add keystone-oidc.php readme.txt changelog.txt

          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
          else
            git commit -m "chore(release): ${VERSION} [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

          HEAD_SHA="$(git rev-parse HEAD)"
          REMOTE_TAG_SHA="$(git ls-remote --refs origin "refs/tags/${TAG}" | awk '{print $1}')"

          if [ -n "${REMOTE_TAG_SHA}" ]; then
            if [ "${REMOTE_TAG_SHA}" = "${HEAD_SHA}" ]; then
              echo "Tag ${TAG} already exists on the release commit."
              exit 0
            fi
            echo "Remote tag ${TAG} already exists on ${REMOTE_TAG_SHA}, expected ${HEAD_SHA}."
            exit 1
          fi

          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            git tag -d "${TAG}"
          fi

          git tag -a "${TAG}" -m "Release ${VERSION}"
          git push origin "refs/tags/${TAG}"

      - name: Create plugin ZIP
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          PLUGIN_DIR="keystone-oidc"
          ARCHIVE="keystone-oidc-${VERSION}.zip"

          rm -rf "/tmp/${PLUGIN_DIR}"
          mkdir -p "/tmp/${PLUGIN_DIR}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='assets' \
            --exclude='.gitignore' \
            --exclude='docs' \
            --exclude='*.zip' \
            . "/tmp/${PLUGIN_DIR}/"

          (cd /tmp && zip -r "${GITHUB_WORKSPACE}/${ARCHIVE}" "${PLUGIN_DIR}")

          echo "archive=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "Created ${ARCHIVE}"
          ls -lh "${ARCHIVE}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ inputs.tag }}
          name: Keystone OIDC ${{ inputs.tag }}
          body: |
            ## Keystone OIDC ${{ inputs.tag }}

            ${{ inputs.changelog }}

            ### Installation

            1. Download `keystone-oidc-${{ inputs.version }}.zip` below
            2. In your WordPress admin go to **Plugins → Add New → Upload Plugin**
            3. Upload the ZIP file and activate the plugin
            4. Navigate to **OIDC Provider** in the admin sidebar to create your first client

            ### What's included

            - Authorization Code Flow with PKCE support
            - RS256 JWT signed tokens
            - Admin UI for client management
            - OIDC Discovery endpoint
            - Refresh token support
          files: ${{ env.archive }}
          draft: false
          prerelease: false

      - name: Deploy to WordPress.org SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          SVN_URL="https://plugins.svn.wordpress.org/keystone-oidc"
          SVN_DIR="/tmp/wordpress-svn"
          ASSET_STAGING="/tmp/wordpress-assets"

          rm -rf "${SVN_DIR}" "${ASSET_STAGING}"
          svn checkout "${SVN_URL}" "${SVN_DIR}" \
            --username "${SVN_USERNAME}" \
            --password "${SVN_PASSWORD}" \
            --non-interactive
          mkdir -p "${SVN_DIR}/trunk" "${SVN_DIR}/tags" "${SVN_DIR}/assets"

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='assets' \
            --exclude='.gitignore' \
            --exclude='docs' \
            --exclude='*.zip' \
            . "${SVN_DIR}/trunk/"

          mkdir -p "${ASSET_STAGING}"
          rsync -a --delete \
            --include='*/' \
            --include='banner-772x250.png' \
            --include='banner-1544x500.png' \
            --include='icon-128x128.png' \
            --include='icon-256x256.png' \
            --include='screenshot-*.png' \
            --exclude='*' \
            assets/ "${ASSET_STAGING}/"
          rsync -a --delete "${ASSET_STAGING}/" "${SVN_DIR}/assets/"

          cd "${SVN_DIR}"

          if [ -d "tags/${VERSION}" ]; then
            svn rm "tags/${VERSION}"
          fi
          svn copy trunk "tags/${VERSION}"

          svn add --force trunk tags assets --auto-props --parents --depth infinity -q
          svn status | awk '/^!/ { print substr($0, 9) }' | while IFS= read -r missing_path; do
            svn rm "${missing_path}"
          done

          find assets -type f -name '*.png' -print0 | xargs -0 -r svn propset svn:mime-type image/png

          SVN_STATUS="$(svn status)"
          if [ -n "${SVN_STATUS}" ]; then
            printf '%s\n' "${SVN_STATUS}"
            svn commit -m "Release ${VERSION}" \
              --username "${SVN_USERNAME}" \
              --password "${SVN_PASSWORD}" \
              --non-interactive
          else
            echo "No WordPress.org SVN changes to commit."
          fi
