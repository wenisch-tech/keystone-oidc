name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Update plugin version in PHP header
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^ \* Version:.*/ * Version:           ${VERSION}/" wp-oidcserver.php
          sed -i "s/define( 'WP_OIDC_VERSION', '[^']*' )/define( 'WP_OIDC_VERSION', '${VERSION}' )/" wp-oidcserver.php

      - name: Update stable tag in readme.txt
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^Stable tag:.*/Stable tag: ${VERSION}/" readme.txt

      - name: Create plugin ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLUGIN_DIR="wp-oidcserver"
          ARCHIVE="wp-oidcserver-${VERSION}.zip"

          # Create a temporary staging directory with the plugin folder name
          mkdir -p "/tmp/${PLUGIN_DIR}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='*.zip' \
            . "/tmp/${PLUGIN_DIR}/"

          # Create the zip from /tmp so the archive contains wp-oidcserver/ as root folder
          (cd /tmp && zip -r "${GITHUB_WORKSPACE}/${ARCHIVE}" "${PLUGIN_DIR}")

          echo "archive=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "Created ${ARCHIVE}"
          ls -lh "${ARCHIVE}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WP OIDC Server ${{ steps.version.outputs.tag }}
          body: |
            ## WP OIDC Server ${{ steps.version.outputs.tag }}

            ### Installation

            1. Download `wp-oidcserver-${{ steps.version.outputs.version }}.zip` below
            2. In your WordPress admin go to **Plugins → Add New → Upload Plugin**
            3. Upload the ZIP file and activate the plugin
            4. Navigate to **OIDC Server** in the admin sidebar to create your first client

            ### What's included

            - Authorization Code Flow with PKCE support
            - RS256 JWT signed tokens
            - Admin UI for client management
            - OIDC Discovery endpoint
            - Refresh token support
          files: ${{ env.archive }}
          draft: false
          prerelease: false
